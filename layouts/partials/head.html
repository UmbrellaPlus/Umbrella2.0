<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="description" content="{{.Params.description}}" />
<meta property="og:title" content="{{.Params.tabTitle}}" />
<meta property="og:description" content="{{.Params.description}}" />
<meta
  property="og:image"
  content="https://umbrella-plus.com.ua/img/flavicon.png"
/>
<meta property="og:url" content="{{.Permalink}}" />
<meta property="og:type" content="article" />
<!-- Favicon -->
<link rel="icon" href="/favicon.svg" type="image/svg+xml" sizes="any"/>
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="manifest" href="/site.webmanifest">
<link rel="icon" href="/favicon.ico" type="image/x-icon">
<title>{{.Params.tabTitle}}</title>
<!-- Canonical URL -->
<link rel="canonical" href="{{ .Permalink }}" />
<link rel="stylesheet" href="/splide/dist/css/splide.min.css" />
{{/* Styles */}} {{partial "css.html" .}}
<link
  rel="preload"
  href="/fonts/roboto-v50-latin-regular.woff2"
  as="font"
  type="font/woff2"
  crossorigin
/>

{{/* USED IN SINGLE PAGES: SERVICE CHOOSEN FROM FILIALS, BLOG PAGE */}}
<script type="application/ld+json">
  {
    "@context":"https://schema.org",
    "@graph":[
      {
        "@type":"{{ if eq .Kind "home" }}WebSite{{ else if eq .Section "blog" }}BlogPosting{{ else }}Article{{ end }}",
        "mainEntityOfPage": {
          "@type": "WebPage",
          "@id": "{{ .Permalink }}"
        },
        "headline":"{{ .Params.tabTitle }}",
        "datePublished":"{{ with .Params.date }}{{ time.Format "2006-01-02T15:04:05Z07:00" . }}{{ end }}",
        "dateModified":"{{ with .Params.lastmod }}{{ time.Format "2006-01-02T15:04:05Z07:00" . }}{{ end }}",
        "image":"{{ .Params.image | absURL}}",
        "author":{
          {{if eq .Params.expert "kostya"}}
          "@type":"Person",
          "name":"Богоденко Констянтин",
          "jobTitle":"Врач анастезиолог"
          {{else if eq .Params.expert "olga"}}
          "@type":"Person",
          "name":"Робулец Ольга",
          "jobTitle":"Врач нарколог"
          {{else}}
          "@type":"Person",
          "name":"Станислав Могучев",
          "jobTitle":"Врач терапевт"
          {{end}}
        },
        "publisher":{
          "@type": "Organization",
          "name": "{{.Site.Title}}",
          "logo":{
            "@type": "ImageObject",
            "url": "{{"/favicon.svg" | absURL}}"
          }
        }
      },
      {
        "@type":"BreadcrumbList",
        "itemListElement":[
          {
            "@type":"ListItem",
            "position":1,
            "name":"Главная",
            "item":"{{ .Site.BaseURL }}"
          },
          {
            "@type":"ListItem",
            "position":2,
            "name":"{{ .CurrentSection.Title }}",
            "item":"{{ .CurrentSection.Permalink }}"
          },
          {
            "@type":"ListItem",
            "position":3,
            "name":"{{ .Params.tabTitle }}",
            "item":"{{ .Permalink }}"
          }
        ]
      }
    ]
  }
</script>

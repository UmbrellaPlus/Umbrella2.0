{{/*  USED IN LIST PAGES: SERVICES LAYOUT, BLOG LIST  */}}
<script type="application/ld+json">
{
  "@context":"https://schema.org",
  "@graph":[
    {
      "@type":"MedicalWebPage",
      "headline":"{{ .Params.tabTitle }}",
      "datePublished":"{{ with .Params.date }}{{ time.Format "2006-01-02T15:04:05Z07:00" . }}{{ end }}",
      "dateModified":"{{ with .Params.lastmod }}{{ time.Format "2006-01-02T15:04:05Z07:00" . }}{{ end }}",
      "image":"{{ .Params.image }}",
      "author":{
        "@type":"Person",
        "name":"Stanislav Moguchev",
        "jobTitle":"Врач-терапевт"
      }
    },
    {
      "@type":"BreadcrumbList",
      "itemListElement":[
        {
          "@type":"ListItem",
          "position":1,
          "name":"Главная",
          "item":"{{ .Site.BaseURL }}"
        },
        {
          "@type":"ListItem",
          "position":2,
          "name":"{{ .Title }}",
          "item":"{{ .Permalink }}"
        }
      ]
    }
  ]
}
</script>
